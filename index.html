<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BL0Xa</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ===== ROOT ===== */
:root{
--main:#8b5cf6;
--bg:#050505;
--text:#fff;
--glass:rgba(255,255,255,0.06);
}

*{margin:0;padding:0;box-sizing:border-box;cursor:none;}

/* ===== BODY ===== */
body{
font-family:'Orbitron',sans-serif;
background:var(--bg);
color:var(--text);
overflow-x:hidden;
}

/* ===== CUSTOM CURSOR ===== */
.cursor{
width:12px;
height:12px;
border-radius:50%;
background:var(--main);
position:fixed;
pointer-events:none;
z-index:999;
}

.cursor2{
width:30px;
height:30px;
border:1px solid var(--main);
border-radius:50%;
position:fixed;
pointer-events:none;
z-index:998;
}

/* ===== CANVAS ===== */
#rain{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* ===== HEADER ===== */
header{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
animation:fadeIn 1.5s ease;
}

h1{
font-size:52px;
background:linear-gradient(90deg,var(--main),#fff);
-webkit-background-clip:text;
color:transparent;
}

p{
margin-top:20px;
max-width:600px;
color:#ccc;
}

/* ===== GLASS CARD ===== */
.card{
margin-top:30px;
padding:25px;
border-radius:20px;
background:var(--glass);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 30px rgba(139,92,246,0.4);
}

/* ===== BUTTONS ===== */
.btn{
display:inline-block;
margin:8px;
padding:10px 16px;
border-radius:10px;
border:1px solid var(--main);
text-decoration:none;
color:var(--text);
transition:0.3s;
}

.btn:hover{
background:var(--main);
box-shadow:0 0 20px var(--main);
}

/* ===== PANEL ===== */
.panel{
position:fixed;
top:10px;
right:10px;
z-index:10;
}

/* ===== SECTION ===== */
section{
padding:80px 20px;
text-align:center;
}

/* ===== ANIMATION ===== */
@keyframes fadeIn{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

/* ===== MOBILE ===== */
@media(max-width:700px){
h1{font-size:36px;}
}

<script>

/* ===== CURSOR ===== */
const c=document.querySelector(".cursor");
const c2=document.querySelector(".cursor2");

document.addEventListener("mousemove",(e)=>{
c.style.left=e.clientX+"px";
c.style.top=e.clientY+"px";

setTimeout(()=>{
c2.style.left=e.clientX+"px";
c2.style.top=e.clientY+"px";
},80);
});

/* ===== COPY ===== */
function copyTG(){
navigator.clipboard.writeText("@otxao");
alert("Скопировано");
}

/* ===== LANG ===== */
let lang="ru";
function toggleLang(){
lang=lang==="ru"?"en":"ru";
desc.innerText = lang==="ru"
? "Я медиа-блогер по Minecraft Bedrock и Java разработчик."
: "Minecraft Bedrock media creator & Java developer.";
}

/* ===== THEME ===== */
let dark=true;
function toggleTheme(){
if(dark){
document.documentElement.style.setProperty('--bg','#fff');
document.documentElement.style.setProperty('--text','#000');
}else{
document.documentElement.style.setProperty('--bg','#050505');
document.documentElement.style.setProperty('--text','#fff');
}
dark=!dark;
}

/* ===== NEON RAIN ===== */
const canvas=document.getElementById("rain");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let rods=[];

for(let i=0;i<140;i++){
rods.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
len:Math.random()*40+10,
speed:Math.random()*2+1,
z:1
});
}

let mx=0,my=0;
document.addEventListener("mousemove",(e)=>{
mx=e.clientX;
my=e.clientY;
});

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

rods.forEach(r=>{

let dx=mx-r.x;
let dy=my-r.y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<150){
r.z=Math.min(2,r.z+0.05);
}else{
r.z=Math.max(1,r.z-0.02);
}

r.y+=r.speed*r.z;

if(r.y>canvas.height){
r.y=-20;
r.x=Math.random()*canvas.width;
}

ctx.strokeStyle="rgba(139,92,246,"+(0.5*r.z)+")";
ctx.lineWidth=2*r.z;

ctx.beginPath();
ctx.moveTo(r.x,r.y);
ctx.lineTo(r.x,r.y+r.len*r.z);
ctx.stroke();

});

requestAnimationFrame(draw);
}

draw();

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
});

</script>
