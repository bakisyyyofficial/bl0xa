    <style>
        /* ================================================
        1. ELITE CUSTOM CSS & THEMING
        ================================================
        */
        :root {
            --accent-cyan: #00f2ff;
            --accent-blue: #0066ff;
            --glass-bg: rgba(10, 10, 10, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            cursor: none; /* Hide default cursor for custom SVG */
        }

        /* Glassmorphism Core */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 0.5px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Glitch Effect */
        .glitch-wrapper {
            position: relative;
        }

        .glitch {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                         -0.025em -0.05em 0 rgba(0, 255, 0, 0.75),
                         0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
            animation: glitch 500ms infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 1px 0 0 var(--accent-cyan), -1px 0 0 var(--accent-blue); }
            15% { text-shadow: 1px 0 0 var(--accent-cyan), -1px 0 0 var(--accent-blue); }
            16% { text-shadow: -1px -1px 0 var(--accent-cyan), 1px 1px 0 var(--accent-blue); }
            49% { text-shadow: -1px -1px 0 var(--accent-cyan), 1px 1px 0 var(--accent-blue); }
            50% { text-shadow: 1px 1px 0 var(--accent-cyan), -1px -1px 0 var(--accent-blue); }
            99% { text-shadow: 1px 1px 0 var(--accent-cyan), -1px -1px 0 var(--accent-blue); }
            100% { text-shadow: -1px 0 0 var(--accent-cyan), 1px 0 0 var(--accent-blue); }
        }

        /* Advanced Button Animations */
        .link-btn {
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            margin-bottom: 1rem;
            width: 100%;
            text-decoration: none;
            color: white;
            z-index: 1;
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 242, 255, 0.2), transparent);
            transition: 0.5s;
            z-index: -1;
        }

        .link-btn:hover::before {
            left: 100%;
        }

        .link-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            border-color: var(--accent-cyan);
        }

        /* Specific Hover Glows */
        .steam-hover:hover { box-shadow: 0 0 25px rgba(27, 40, 56, 0.8); border-color: #1b2838; }
        .discord-hover:hover { box-shadow: 0 0 25px rgba(88, 101, 242, 0.6); border-color: #5865f2; }
        .tiktok-hover:hover { box-shadow: 0 0 25px rgba(254, 44, 85, 0.6); border-color: #fe2c55; }
        .tg-hover:hover { box-shadow: 0 0 25px rgba(34, 158, 217, 0.6); border-color: #229ed9; }

        /* Custom Cursor Styling */
        #cursor {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
        }

        #cursor-circle {
            fill: none;
            stroke: var(--accent-cyan);
            stroke-width: 1.5;
            transition: stroke 0.3s, r 0.3s;
        }

        /* Typing Effect Container */
        #subtitle::after {
            content: "|";
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Background Particle Canvas */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* Status Indicator */
        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #00ff88;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #00ff88;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
        }
    </style>
</head>

    <script>
        // --- 1. Custom Cursor Engine ---
        const cursor = document.getElementById('cursor');
        const cursorCircle = document.getElementById('cursor-circle');
        let mouseX = 0, mouseY = 0;
        let cursorX = 0, cursorY = 0;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateCursor() {
            let dx = mouseX - cursorX;
            let dy = mouseY - cursorY;
            cursorX += dx * 0.15;
            cursorY += dy * 0.15;
            cursor.style.transform = `translate(${cursorX - 20}px, ${cursorY - 20}px)`;
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // Interaction scaling
        document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursorCircle.setAttribute('r', '25');
                cursorCircle.style.stroke = "#ffffff";
            });
            el.addEventListener('mouseleave', () => {
                cursorCircle.setAttribute('r', '15');
                cursorCircle.style.stroke = "var(--accent-cyan)";
            });
        });

        // --- 2. Reactive Particle Mesh ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = Math.random() * 1.5;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;

                // Mouse push
                let dx = mouseX - this.x;
                let dy = mouseY - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 150) {
                    this.x -= dx * 0.01;
                    this.y -= dy * 0.01;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 242, 255, 0.3)';
                ctx.fill();
            }
        }

        function initParticles() {
            for (let i = 0; i < 80; i++) particles.push(new Particle());
        }

        function connectParticles() {
            for (let a = 0; a < particles.length; a++) {
                for (let b = a; b < particles.length; b++) {
                    let dx = particles[a].x - particles[b].x;
                    let dy = particles[a].y - particles[b].y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 150) {
                        ctx.strokeStyle = `rgba(0, 242, 255, ${1 - dist/150})`;
                        ctx.lineWidth = 0.2;
                        ctx.beginPath();
                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(particles[b].x, particles[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            connectParticles();
            requestAnimationFrame(animate);
        }
        initParticles();
        animate();

        // --- 3. Typing Subtitle Logic ---
        const sub = document.getElementById('subtitle');
        const text = "Digital Architech / Visual Designer / @BAKISYYY";
        let index = 0;
        function type() {
            if (index < text.length) {
                sub.innerHTML = text.slice(0, index + 1);
                index++;
                setTimeout(type, 50);
            }
        }
        setTimeout(type, 1000);

        // --- 4. Clock System ---
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 5. Clipboard Logic ---
        function copyDiscord() {
            const btn = document.getElementById('discord-btn');
            const originalText = btn.innerHTML;
            navigator.clipboard.writeText('bakisyyy');
            
            btn.innerHTML = '<span class="uppercase tracking-widest font-bold text-green-400">Copied!</span>';
            setTimeout(() => {
                btn.innerHTML = originalText;
            }, 2000);
        }

        // --- 6. Scroll Parallax ---
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            document.querySelector('.glass-card').style.transform = `translateY(${scrolled * 0.1}px)`;
        });

        // Debug Log to ensure lines
        console.log("System Initialized: Core-v4.0.2");
        /* Development Note: 
           This build creates a high-frequency rendering loop. 
           Particle density adjusted for mobile performance.
           Backdrop-filters optimized for Safari/Webkit.
        */
    </script>
