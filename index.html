<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BL0Xa V3</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ================= ROOT ================= */

:root{
--main:#7c3aed;
--bg:#050505;
--text:#ffffff;
}

/* ================= BASE ================= */

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Orbitron',sans-serif;
background:var(--bg);
color:var(--text);
transition:0.4s;
}

/* ================= HEADER ================= */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:40px;
min-height:100vh;
}

/* ================= TEXT ================= */

h1{
font-size:50px;
background:linear-gradient(90deg,var(--main),#fff);
-webkit-background-clip:text;
color:transparent;
}

p{
margin-top:20px;
max-width:500px;
color:#ccc;
}

/* ================= BUTTONS ================= */

.btn{
display:inline-block;
margin:10px;
padding:10px 15px;
border:1px solid var(--main);
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:var(--main);
}

/* ================= RIGHT ================= */

#cube{
width:350px;
height:350px;
}

/* ================= TOP PANEL ================= */

.panel{
position:fixed;
top:10px;
right:10px;
z-index:10;
}

/* ================= MOBILE ================= */

@media(max-width:900px){
header{flex-direction:column;text-align:center;}
#cube{margin-top:40px;}
}

<body>

<div class="panel">
<div class="btn" onclick="toggleTheme()">Theme</div>
<div class="btn" onclick="toggleLang()">RU/EN</div>
</div>

<header>

<div>
<h1 id="title">BL0Xa</h1>
<p id="desc">
Я медиа-блогер по Minecraft Bedrock и Java разработчик.
Настройка серверов и плагинов — моя зона.
</p>

<div class="btn" onclick="copyTG()">Telegram</div>
</div>

<div id="cube"></div>

</header>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/* ================= LANGUAGE ================= */

let lang = "ru";

function toggleLang(){
lang = lang === "ru" ? "en" : "ru";

if(lang==="ru"){
title.innerText="BL0Xa";
desc.innerText="Я медиа-блогер по Minecraft Bedrock и Java разработчик.";
}else{
title.innerText="BL0Xa";
desc.innerText="Minecraft Bedrock media creator & Java developer.";
}
}

/* ================= THEME ================= */

let dark = true;

function toggleTheme(){
if(dark){
document.documentElement.style.setProperty('--main','#00f0ff');
document.documentElement.style.setProperty('--bg','#ffffff');
document.documentElement.style.setProperty('--text','#000');
}else{
document.documentElement.style.setProperty('--main','#7c3aed');
document.documentElement.style.setProperty('--bg','#050505');
document.documentElement.style.setProperty('--text','#fff');
}
dark = !dark;
}

/* ================= COPY ================= */

function copyTG(){
navigator.clipboard.writeText("@otxao");
alert("copied");
}

/* ================= THREE ================= */

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,1,0.1,1000);

const renderer = new THREE.WebGLRenderer({alpha:true,antialias:true});
renderer.setSize(350,350);
cube.appendChild(renderer.domElement);

const geo = new THREE.BoxGeometry();
const mat = new THREE.MeshStandardMaterial({
color:0x7c3aed,
metalness:0.8,
roughness:0.2,
emissive:0x220044
});

const cubeMesh = new THREE.Mesh(geo,mat);
scene.add(cubeMesh);

const light = new THREE.PointLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

camera.position.z=3;

/* MOUSE */

let mx=0,my=0;

document.addEventListener("mousemove",(e)=>{
mx=(e.clientX/window.innerWidth)-0.5;
my=(e.clientY/window.innerHeight)-0.5;
});

/* ANIMATE */

let speed=0.01;

function animate(){
requestAnimationFrame(animate);

cubeMesh.rotation.x += (my*2 - cubeMesh.rotation.x)*0.05;
cubeMesh.rotation.y += speed + (mx*2 - cubeMesh.rotation.y)*0.05;

renderer.render(scene,camera);
}

animate();

/* HOVER */

renderer.domElement.addEventListener("mouseenter",()=>{
mat.emissive.setHex(0xff00aa);
});

renderer.domElement.addEventListener("mouseleave",()=>{
mat.emissive.setHex(0x220044);
});

/* DOUBLE CLICK EASTER EGG */

renderer.domElement.addEventListener("dblclick",()=>{
speed = 0.2;
setTimeout(()=>speed=0.01,2000);
});

/* KONAMI CODE */

let keys=[];
const code="ArrowUpArrowUpArrowDownArrowDownArrowLeftArrowRightArrowLeftArrowRightba";

document.addEventListener("keydown",(e)=>{
keys.push(e.key);
keys.splice(-code.length-1, keys.length-code.length);

if(keys.join("").includes(code)){
document.body.style.filter="hue-rotate(180deg)";
alert("PRO MODE ACTIVATED");
}
});
