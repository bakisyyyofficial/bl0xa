<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAKISYYY | Cyber-Minimalism</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Syncopate:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        /* ================================================
        ELITE STYLING & FX
        ================================================
        */
        :root {
            --accent-cyan: #00f2ff;
            --accent-blue: #0066ff;
            --glass-bg: rgba(5, 5, 5, 0.75);
            --glass-border: rgba(0, 242, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #020202;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Частицы на весь экран */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Главная карточка с неоновым контуром */
        .main-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), 
                        inset 0 0 20px rgba(0, 242, 255, 0.05);
            transition: transform 0.1s ease-out;
        }

        /* Пиздатое свечение по краям */
        .main-card::after {
            content: '';
            position: absolute;
            inset: -1px;
            background: linear-gradient(45deg, var(--accent-cyan), transparent, var(--accent-blue), transparent);
            border-radius: 20px;
            z-index: -1;
            opacity: 0.3;
        }

        /* Глитч для BAKISYYY */
        .glitch-text {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            position: relative;
            text-shadow: 2px 2px var(--accent-blue);
            animation: text-glitch 3s infinite;
        }

        @keyframes text-glitch {
            0% { text-shadow: 2px 2px var(--accent-blue); }
            5% { text-shadow: -2px -2px var(--accent-cyan); }
            10% { text-shadow: 2px -2px #ff00c1; }
            15% { text-shadow: 0 0 transparent; }
            100% { text-shadow: 0 0 transparent; }
        }

        /* Кнопки */
        .link-item {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .link-item:hover {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--accent-cyan);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 242, 255, 0.2);
            color: var(--accent-cyan);
        }

        /* Эффект сканирования на кнопках */
        .link-item::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
        }
        .link-item:hover::before { left: 100%; }

        /* Фоновый холст */
        #canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Статус бар */
        .status-container {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            border: 0.5px solid rgba(255,255,255,0.05);
        }

        .dot {
            width: 6px; height: 6px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff88;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            50% { opacity: 0.3; }
        }

        /* Скрываем скроллбар */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <main class="main-card" id="card">
        
        <header class="text-center mb-8">
            <h1 class="glitch-text text-3xl mb-2">BAKISYYY</h1>
            <p id="typewriter" class="text-[10px] text-cyan-500 font-mono tracking-[4px] uppercase h-4"></p>
        </header>

        <div class="status-container mb-8">
            <div class="flex items-center">
                <span class="dot"></span>
                <span class="opacity-70">SYSTEM ONLINE</span>
            </div>
            <div id="timer" class="opacity-50">00:00:00</div>
        </div>

        <div class="flex flex-col">
            <button onclick="copyDiscord()" class="link-item group">
                <span class="font-bold">DISCORD</span>
                <span id="disc-val" class="ml-2 text-[8px] opacity-0 group-hover:opacity-100 transition-opacity text-gray-400">[bakisyyy]</span>
            </button>

            <a href="https://steamcommunity.com/profiles/76561199581662267/" target="_blank" class="link-item">
                <span class="font-bold">STEAM PROFILE</span>
            </a>

            <a href="https://www.tiktok.com/@bl0xa_off" target="_blank" class="link-item">
                <span class="font-bold">TIKTOK</span>
            </a>

            <a href="https://t.me/BL0Xaoff" target="_blank" class="link-item">
                <span class="font-bold">TELEGRAM CHANNEL</span>
            </a>

            <a href="https://t.me/otxao" target="_blank" class="link-item" style="border-color: rgba(0, 242, 255, 0.4); background: rgba(0, 242, 255, 0.05);">
                <span class="font-bold text-cyan-400">CONTACT @OTXAO</span>
            </a>
        </div>

        <footer class="mt-10 text-center">
            <p class="text-[8px] tracking-[5px] text-white/20 uppercase">Encoded by Bakisyyy // 2026</p>
        </footer>
    </main>

    <script>
        /**
         * 1. СИСТЕМА ЧАСТИЦ-ШЛЕЙФА ЗА МЫШЬЮ
         */
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const mouse = { x: undefined, y: undefined };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
            // При движении создаем 2 новые частицы
            for(let i = 0; i < 2; i++) {
                particles.push(new Particle());
            }
        });

        class Particle {
            constructor() {
                this.x = mouse.x;
                this.y = mouse.y;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.color = `rgba(0, 242, 255, ${Math.random()})`;
                this.life = 1; // "Здоровье" частицы
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 0.015; // Постепенно исчезает
                if (this.size > 0.1) this.size -= 0.05;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function handleParticles() {
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
        }

        // Фоновая сетка для красоты
        function drawGrid() {
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.03)';
            ctx.lineWidth = 1;
            const step = 50;
            for (let x = 0; x < canvas.width; x += step) {
                ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
            }
            for (let y = 0; y < canvas.height; y += step) {
                ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
            }
            ctx.stroke();
        }

        function animate() {
            ctx.fillStyle = 'rgba(2, 2, 2, 0.15)'; // Хвост за частицами
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawGrid();
            handleParticles();
            requestAnimationFrame(animate);
        }
        animate();

        /**
         * 2. ЭФФЕКТ ПЕЧАТИ
         */
        const text = "Visual Architect / UI Enthusiast";
        let idx = 0;
        function type() {
            if(idx < text.length) {
                document.getElementById('typewriter').innerHTML += text.charAt(idx);
                idx++;
                setTimeout(type, 100);
            }
        }
        setTimeout(type, 1000);

        /**
         * 3. ЧАСЫ
         */
        setInterval(() => {
            const now = new Date();
            document.getElementById('timer').innerText = now.toLocaleTimeString();
        }, 1000);

        /**
         * 4. КОПИРОВАНИЕ
         */
        function copyDiscord() {
            navigator.clipboard.writeText("bakisyyy");
            const btn = document.getElementById('disc-val');
            btn.innerText = "[СКОПИРОВАНО]";
            btn.style.color = "#00ff88";
            setTimeout(() => {
                btn.innerText = "[bakisyyy]";
                btn.style.color = "";
            }, 2000);
        }

        /**
         * 5. ПАРАЛЛАКС КАРТОЧКИ
         */
        const card = document.getElementById('card');
        window.addEventListener('mousemove', (e) => {
            let x = (window.innerWidth / 2 - e.pageX) / 30;
            let y = (window.innerHeight / 2 - e.pageY) / 30;
            card.style.transform = `rotateX(${y}deg) rotateY(${-x}deg)`;
        });
    </script>
</body>
</html>
